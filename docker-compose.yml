# SprintFlow — Single Server Docker Compose
# Usage:
#   docker compose up -d --build
#
# Services:
#   mysql    — MySQL 8, data persisted in named volume
#   backend  — Spring Boot 3.2 / Java 21, port 8080 (exposed to host)
#   frontend — Nginx serving React build, port 80

services:

  # ── MySQL 8 ─────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: sprintflow-mysql
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE:      sprintflow_db
      MYSQL_USER:          sprintflow
      MYSQL_PASSWORD:      ${DB_PASSWORD:-sprintflow123}

    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/init:/docker-entrypoint-initdb.d:ro

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "sprintflow", "-p${DB_PASSWORD:-sprintflow123}"]
      interval: 10s
      timeout:  5s
      retries:  10
      start_period: 30s

    networks:
      - sprintflow-net

    deploy:
      resources:
        limits:
          memory: 768M

  # ── Spring Boot Backend ──────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sprintflow-backend
    restart: unless-stopped

    depends_on:
      mysql:
        condition: service_healthy

    environment:
      DB_URL:      jdbc:mysql://mysql:3306/sprintflow_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DB_USERNAME: sprintflow
      DB_PASSWORD: ${DB_PASSWORD:-sprintflow123}
      DDL_AUTO:    ${DDL_AUTO:-update}

      APP_JWT_SECRET: ${APP_JWT_SECRET}
      APP_MAIL_KEY:   ${APP_MAIL_KEY}

      APP_CORS_ORIGINS: ${APP_CORS_ORIGINS}
      APP_FRONTEND_URL: ${APP_FRONTEND_URL}

      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-false}

      JAVA_OPTS: "-Xms256m -Xmx768m"

    # Publish port 8080 to the host so the browser can call the API directly
    ports:
      - "8080:8080"

    networks:
      - sprintflow-net

    deploy:
      resources:
        limits:
          memory: 1024M

  # ── Nginx Frontend ───────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_WS_URL:       ${VITE_WS_URL}
        VITE_USE_MOCK:     "false"

    container_name: sprintflow-frontend
    restart: unless-stopped

    depends_on:
      - backend

    ports:
      - "80:80"

    volumes:
      - ./docker/ssl:/etc/nginx/ssl:ro

    networks:
      - sprintflow-net

    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  mysql_data:
    driver: local

networks:
  sprintflow-net:
    driver: bridge
