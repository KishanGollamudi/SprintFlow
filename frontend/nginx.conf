worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Gzip compression — reduces JS/CSS transfer size significantly
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;
    gzip_min_length 1024;
    gzip_comp_level 5;

    # ── Redirect HTTP → HTTPS ──────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── Main HTTPS server ──────────────────────────────────────
    server {
        listen 443 ssl;
        server_name _;

        # Self-signed certificate (generated at deploy time)
        ssl_certificate     /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;

        # Modern TLS settings
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        root  /usr/share/nginx/html;
        index index.html;

        # ── React SPA — all unknown routes serve index.html ────
        location / {
            try_files $uri $uri/ /index.html;

            # Cache HTML for 0s (always revalidate) so deploys take effect immediately
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # Cache static assets (JS/CSS/images) for 1 year — Vite hashes filenames
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # ── REST API proxy → Spring Boot ───────────────────────
        location /api/ {
            proxy_pass         http://backend:8080/api/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;

            # Pass CORS preflight through
            proxy_pass_header  Access-Control-Allow-Origin;
        }

        # ── WebSocket proxy → Spring Boot (SockJS/STOMP) ───────
        location /ws {
            proxy_pass         http://backend:8080/ws;
            proxy_http_version 1.1;

            # Required headers for WebSocket upgrade
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;

            # Long timeout — WebSocket connections are persistent
            proxy_read_timeout    3600s;
            proxy_send_timeout    3600s;
            proxy_connect_timeout 10s;
        }
    }
}
